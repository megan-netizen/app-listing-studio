const extractBrandKit = (data) => {
    const kit = { primaryColor: null, backgroundColor: null, textColor: null, fontFamily: null, fontRaw: null, fontSrc: null, fontWeight: 400, raw: {}, foundAt: null, allColors: {} };
    try {
        const ensureHash = v => {
            if (!v || typeof v !== 'string') return null;
            const clean = v.replace(/^#/, '').trim();
            if (clean.length === 8) return '#' + clean.slice(0, 6);
            if (clean.length === 6) return '#' + clean;
            if (clean.length === 3) return '#' + clean;
            return null;
        };
        const isColorLike = v => typeof v === 'string' && /^#?[0-9a-fA-F]{3,8}$/.test(v.trim());
        const findTheme = (obj, path) => {
            if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return null;
            if ('core_brandColorPrimary' in obj) return { obj, path };
            for (const k of Object.keys(obj)) {
                const found = findTheme(obj[k], `${path}.${k}`);
                if (found) return found;
            }
            return null;
        };
        const result = findTheme(data, 'root');
        if (result) {
            const { obj, path } = result;
            kit.raw = obj; kit.foundAt = path;
            kit.backgroundColor = ensureHash(obj.core_brandColorPrimary);
            kit.textColor       = ensureHash(obj.button_primaryText);
            const fp = obj.typography_font_primary;
            if (fp?.fontFamily) {
                kit.fontFamily = fp.fontFamily;
                kit.fontRaw    = fp.fullName || fp.fontFamily;
                kit.fontSrc    = fp.src || null;
                kit.fontWeight = fp.fontWeight || 400;
            }
            // Collect ALL color fields from the theme object — dedupe globally by hex
            const seenHex = new Set();
            const colorEntries = [];
            const scanObj = (o, keyPrefix) => {
                if (!o || typeof o !== 'object' || Array.isArray(o)) return;
                for (const k of Object.keys(o)) {
                    const v = o[k];
                    if (typeof v === 'string' && isColorLike(v)) {
                        const hex = ensureHash(v);
                        if (hex && !seenHex.has(hex)) {
                            seenHex.add(hex);
                            colorEntries.push({ key: keyPrefix ? `${keyPrefix}_${k}` : k, hex });
                        }
                    } else if (v && typeof v === 'object' && !Array.isArray(v)) {
                        scanObj(v, k);
                    }
                }
            };
            scanObj(obj, '');
            // Group by first segment of key name
            const groups = {};
            for (const entry of colorEntries) {
                const seg = entry.key.replace(/^_/, '').split('_')[0] || 'other';
                if (!groups[seg]) groups[seg] = [];
                groups[seg].push(entry);
            }
            kit.allColors = groups;
        } else {
            kit.raw = data?.config?.settings || {};
        }
    } catch(e) { console.warn('[BrandKit] error', e); }
    return kit;
};

// ── Color helpers ─────────────────────────────────────────────────────────────
const getLuminance = hex => {
    try {
        const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
        const tl=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
        return 0.2126*tl(r)+0.7152*tl(g)+0.0722*tl(b);
    } catch { return 0; }
};
const getContrast = (h1,h2) => { try { const l1=getLuminance(h1),l2=getLuminance(h2); return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05); } catch { return 1; } };
const isValidHex = h => h && /^#[0-9a-fA-F]{6}$/.test(h);
const friendlyKey = key => key.replace(/^_/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();
const GROUP_LABELS = {core:'Core',button:'Button',nav:'Navigation',tab:'Tab Bar',card:'Card',text:'Text',icon:'Icon',border:'Border',background:'Background',badge:'Badge',header:'Header',product:'Product',search:'Search',modal:'Modal',toast:'Toast',other:'Other'};

const SuggestColors = ({ allColors, onApplyBg, onApplyText }) => {
    const [open, setOpen]           = useState(false);
    const [pickMode, setPickMode]   = useState(null);
    const [selBg, setSelBg]         = useState(null);
    const [selText, setSelText]     = useState(null);
    const [hovered, setHovered]     = useState(null);

    const contrast = (selBg && selText) ? getContrast(selBg, selText) : null;
    const contrastOk = contrast && contrast >= 4.5;

    const handleSwatch = hex => {
        if (pickMode==='bg')        { setSelBg(hex);   setPickMode(null); }
        else if (pickMode==='text') { setSelText(hex); setPickMode(null); }
        else if (!selBg)            { setSelBg(hex);   setPickMode('text'); }
        else if (!selText)          { setSelText(hex); setPickMode(null); }
        else                        { setSelBg(hex);   setPickMode('text'); }
    };

    return (
        <div className="border-t border-gray-100">
            <button onClick={()=>setOpen(v=>!v)}
                className="w-full flex items-center justify-between px-3 py-2 bg-indigo-50 hover:bg-indigo-100 transition-colors">
                <span className="text-[10px] font-bold text-indigo-600 uppercase tracking-wide">✨ Suggest Colors</span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="2.5" style={{transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .18s"}}>
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            {open && (
                <div className="px-3 py-3 space-y-3 bg-white">
                    <p className="text-[9px] text-gray-400 leading-relaxed">Click swatches to build a color pair — BG first, then Text. Preview contrast and apply to all slots.</p>

                    <div className="flex flex-wrap gap-1.5">
                        <button onClick={()=>setPickMode(pickMode==="bg"?null:"bg")}
                            className={"flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-semibold border transition-colors "+(pickMode==="bg"?"bg-indigo-600 text-white border-indigo-600":"border-gray-300 text-gray-600 hover:border-indigo-400")}>
                            {selBg && <span className="w-2.5 h-2.5 rounded-full border border-black/20 inline-block flex-shrink-0" style={{background:selBg}}/>}
                            {selBg ? selBg : "BG color"}
                        </button>
                        <button onClick={()=>setPickMode(pickMode==="text"?null:"text")}
                            className={"flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-semibold border transition-colors "+(pickMode==="text"?"bg-indigo-600 text-white border-indigo-600":"border-gray-300 text-gray-600 hover:border-indigo-400")}>
                            {selText && <span className="w-2.5 h-2.5 rounded-full border border-black/20 inline-block flex-shrink-0" style={{background:selText}}/>}
                            {selText ? selText : "Text color"}
                        </button>
                        {(selBg||selText) && (
                            <button onClick={()=>{setSelBg(null);setSelText(null);setPickMode(null);}} className="px-2 py-1 rounded-full text-[10px] text-gray-400 border border-gray-200 hover:bg-gray-100">✕</button>
                        )}
                    </div>

                    {pickMode && (
                        <p className="text-[9px] text-indigo-500 font-semibold animate-pulse">
                            {pickMode==="bg" ? "👆 Click a swatch → Background" : "👆 Click a swatch → Text color"}
                        </p>
                    )}

                    {selBg && selText && (
                        <div className="rounded-xl overflow-hidden border border-gray-200 shadow-sm">
                            <div className="px-3 py-3 flex items-center justify-between" style={{background:selBg}}>
                                <div>
                                    <div className="text-[13px] font-black" style={{color:selText}}>Headline Text</div>
                                    <div className="text-[10px]" style={{color:selText,opacity:0.85}}>Subheadline text</div>
                                </div>

                            </div>
                            <div className="p-2">
                                <button onClick={()=>{onApplyBg(selBg);onApplyText(selText);}}
                                    className="w-full py-1.5 bg-indigo-600 text-white rounded-lg text-[10px] font-bold hover:bg-indigo-700 transition-colors">
                                    Apply Pair to All Slots
                                </button>
                            </div>
                        </div>
                    )}

                    {selBg && !selText && (
                        <button onClick={()=>onApplyBg(selBg)} className="w-full py-1.5 bg-indigo-600 text-white rounded-lg text-[10px] font-bold hover:bg-indigo-700 transition-colors">
                            Apply BG Only
                        </button>
                    )}

                    {Object.entries(allColors).map(([group, entries]) => {
                        const valid = entries.filter(e => isValidHex(e.hex));
                        if (!valid.length) return null;
                        return (
                            <div key={group}>
                                <div className="text-[8px] font-extrabold text-gray-300 uppercase tracking-widest mb-1.5">
                                    {GROUP_LABELS[group] || group}
                                </div>
                                <div className="flex flex-wrap gap-1.5">
                                    {valid.map(entry => {
                                        const isBg   = selBg   === entry.hex;
                                        const isTx   = selText === entry.hex;
                                        const isHov  = hovered === entry.key;
                                        return (
                                            <div key={entry.key} style={{position:"relative",display:"inline-block"}}>
                                                <button
                                                    onClick={()=>handleSwatch(entry.hex)}
                                                    onMouseEnter={()=>setHovered(entry.key)}
                                                    onMouseLeave={()=>setHovered(null)}
                                                    style={{
                                                        background:entry.hex,
                                                        outline:isBg?"2.5px solid #6366f1":isTx?"2.5px solid #a855f7":"none",
                                                        outlineOffset:"2px"
                                                    }}
                                                    className={"w-8 h-8 rounded-lg border border-black/10 transition-transform "+((isBg||isTx||isHov)?"scale-110 shadow-md":"hover:scale-105")}
                                                    title={friendlyKey(entry.key)+": "+entry.hex}
                                                />
                                                {(isBg||isTx) && (
                                                    <div style={{position:"absolute",top:"-4px",right:"-4px",width:"14px",height:"14px",borderRadius:"50%",background:isBg?"#6366f1":"#a855f7",color:"#fff",fontSize:"7px",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}>
                                                        {isBg?"B":"T"}
                                                    </div>
                                                )}
                                                {isHov && (
                                                    <div style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap"}}>
                                                        <div style={{background:"#111827",color:"#fff",borderRadius:"8px",padding:"4px 8px",fontSize:"9px",textAlign:"center",boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}}>
                                                            <div style={{fontWeight:700}}>{friendlyKey(entry.key)}</div>
                                                            <div style={{opacity:0.7,fontFamily:"monospace"}}>{entry.hex}</div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}
        </div>
    );
};

    const onDblClick=e=>{if(!canvasRef.current||!cur.screenshotImage)return;const rect=canvasRef.current.getBoundingClientRect();const x=(e.clientX-rect.left)/PREVIEW_SCALE,y=(e.clientY-rect.top)/PREVIEW_SCALE;const cw=spec.dw*cur.containerScale,ch=spec.dh*cur.containerScale;const cx=(spec.cw-cw)/2+cur.containerX,cy=spec.dy+cur.containerY;if(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch){setCanDragShot(v=>!v);}};

    const onMouseMove=e=>{if(!canvasRef.current)return;const rect=canvasRef.current.getBoundingClientRect();const x=(e.clientX-rect.left)/PREVIEW_SCALE,y=(e.clientY-rect.top)/PREVIEW_SCALE;if(cur.screenshotImage&&!dragHl&&!dragSub&&!dragCont&&!dragHnd&&!dragShot){const cw=spec.dw*cur.containerScale,ch=spec.dh*cur.containerScale;const cx=(spec.cw-cw)/2+cur.containerX,cy=spec.dy+cur.containerY;setShowHnds(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch);}if(dragHl)setHY(Math.round(Math.max(30,Math.min(spec.ch-50,y))));else if(dragSub)setSY(Math.round(Math.max(30,Math.min(spec.ch-50,y))));else if(dragHnd){const cCx=spec.cw/2+cur.containerX,cCy=spec.dy+(spec.dh*dragStart.scale)/2+cur.containerY;const sd=Math.hypot(dragStart.x-cCx,dragStart.y-cCy),cd=Math.hypot(x-cCx,y-cCy);updCur({containerScale:Math.max(0.5,Math.min(2,dragStart.scale*cd/sd))});}else if(dragShot){setShotX(v=>v+(x-dragStart.x));setShotY(v=>v+(y-dragStart.y));setDragStart({x,y});}else if(dragCont){updCur({containerX:cur.containerX+(x-dragStart.x),containerY:cur.containerY+(y-dragStart.y)});setDragStart({x,y});}};

                                    <div className={`w-3 h-3 bg-white rounded-full shadow mt-0.5 transition-transform ${shadow?'translate-x-4':'translate-x-0.5'}`}/>
                                </div>
                                <span className="text-xs text-gray-600">Enable shadow</span>
                            </label>
                            <div className={shadow?'':'opacity-40 pointer-events-none'}>
                                <ColorInput label="Shadow color" value={sColor} onChange={setSColor}/>
                                <Slider label="Blur" value={sBlur} onChange={setSBlur} min={0} max={100} unit=""/>
                                <Slider label="Opacity" value={Math.round(sOp*100)} onChange={v=>setSOp(v/100)} min={0} max={100} unit="%"/>
                                <Slider label="Offset Y" value={sOffY} onChange={setSOffY} min={0} max={100} unit=""/>
                            </div>
                        </Accordion>

                        <Accordion title="Export">
                            <div>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="section-label mb-0">Include in download</span>
                                    <button onClick={toggleAllSlots} className="text-[9px] font-semibold text-indigo-500 hover:text-indigo-700">
                                        {selectedSlots.size === screenshots.length ? 'Deselect all' : 'Select all'}
                                    </button>
                                </div>
                                <div className="grid grid-cols-3 gap-2 mb-3">
                                    {screenshots.map((ss,i) => {
                                        const isSelected = selectedSlots.has(ss.id);
                                        return (
                                            <div key={ss.id} className="relative group">
                                                <button onClick={()=>toggleSlot(ss.id)}
                                                    className={`relative w-full rounded-lg overflow-hidden border-2 transition-all ${isSelected ? 'border-indigo-500 shadow-md' : 'border-gray-200 hover:border-gray-300'}`}
                                                    style={{aspectRatio:'1242/2688'}}>
                                                    {ss.screenshotImage
                                                        ? <img src={ss.screenshotImage} className="w-full h-full object-cover object-top"/>
                                                        : <div className="w-full h-full bg-gray-100 flex items-center justify-center"><span className="text-gray-300 text-[10px] font-bold">{ss.id}</span></div>
                                                    }
                                                    <div className={`absolute inset-0 transition-opacity ${isSelected?'bg-indigo-600/20':'bg-transparent'}`}/>
                                                    <div className={`absolute top-1 left-1 w-4 h-4 rounded-full border-2 flex items-center justify-center ${isSelected?'bg-indigo-500 border-indigo-500':'bg-white/80 border-gray-300'}`}>
                                                        {isSelected && <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                                                    </div>
                                                    <div className="absolute bottom-0 left-0 right-0 bg-black/50 py-0.5 text-center text-white text-[8px] font-bold">{ss.id}</div>
                                                </button>
                                                <button onClick={()=>removeSlot(ss.id)}
                                                    className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-[9px] font-bold items-center justify-center hidden group-hover:flex shadow">×</button>
                                            </div>
                                        );
                                    })}
                                    <button onClick={addSlot}
                                        className="rounded-lg border-2 border-dashed border-gray-300 hover:border-indigo-400 hover:bg-indigo-50 flex items-center justify-center transition-colors text-gray-400 hover:text-indigo-500"
                                        style={{aspectRatio:'1242/2688'}}>
                                        <span className="text-lg font-light">+</span>
                                    </button>
                                </div>
                                <p className="text-[9px] text-gray-400 mb-3">{selectedSlots.size} of {screenshots.length} slots selected</p>
                            </div>
                            <Btn onClick={()=>download(cur)} disabled={!cur.screenshotImage} variant="default" className="w-full">Download this slot</Btn>
                            <Btn onClick={downloadAll} disabled={screenshots.every(s=>!s.screenshotImage)||selectedSlots.size===0} variant="ghost" className="w-full">Download selected (current device)</Btn>
                            <Btn onClick={downloadBoth} disabled={screenshots.every(s=>!s.screenshotImage)||selectedSlots.size===0} variant="primary" className="w-full">Download selected — iOS + Android</Btn>
                        </Accordion>
                    </div>
                </div>

                {/* ── Canvas ── */}
                <div className="flex-1 flex flex-col overflow-hidden bg-gray-100 order-2">
                    <div className="bg-white border-b border-gray-200 px-4 flex items-center justify-between flex-shrink-0">
                        <div className="flex items-center">
                            {screenshots.map((ss,i)=>(
                                <button key={ss.id} onClick={()=>setActiveIdx(i)}
                                    className={`px-4 py-3 text-xs font-semibold border-b-2 transition-colors ${activeIdx===i?'border-indigo-600 text-indigo-600':'border-transparent text-gray-400 hover:text-gray-700'}`}>
                                    {ss.id}{ss.screenshotImage?' ✓':''}
                                </button>
                            ))}
                            <button onClick={addSlot} className="ml-1 px-2 py-2 text-gray-400 hover:text-indigo-500 text-base leading-none" title="Add slot">+</button>
                        </div>
                        <label className="flex items-center gap-1.5 cursor-pointer select-none pr-1">
                            <input type="checkbox" checked={guides} onChange={e=>setGuides(e.target.checked)} className="w-3.5 h-3.5 rounded"/>
                            <span className="text-xs text-gray-500 font-medium">Guides</span>
                        </label>
                    </div>
                    {canDragShot && cur.screenshotImage && (
                        <div className="flex items-center justify-between px-4 py-2 bg-emerald-500 text-white text-xs font-semibold flex-shrink-0">
                            <span>✂️ Crop mode — drag image or use ↑↓←→ keys to reposition. Double-click canvas to exit.</span>
                            <button onClick={()=>setCanDragShot(false)} className="px-2 py-0.5 bg-white/20 hover:bg-white/30 rounded text-[11px]">Exit</button>
                        </div>
                    )}
                    {!canDragShot && cur.screenshotImage && (
                        <div className="flex items-center px-4 py-1.5 bg-gray-700 text-gray-300 text-[10px] flex-shrink-0">
                            <span>🖱️ Container mode — drag screenshot frame to reposition. Double-click frame to enter crop mode.</span>
                        </div>
                    )}
                    <div className="flex-1 overflow-auto flex items-start justify-center p-10">
                        <div>
                            <canvas ref={canvasRef}
                                onDoubleClick={onDblClick} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
                                style={{
                                    width:`${spec.cw*PREVIEW_SCALE}px`,height:`${spec.ch*PREVIEW_SCALE}px`,
                                    borderRadius:'20px',boxShadow:'0 25px 50px -12px rgba(0,0,0,0.25)',
                                    cursor:dragHl||dragSub||dragCont||dragShot?'grabbing':dragHnd?'nwse-resize':canDragShot?'move':'default',
                                }}/>
                            <p className="text-[10px] text-gray-400 mt-3 text-center">{spec.cw}×{spec.ch}px — drag to reposition · ↑↓ keys to crop image (shift for larger steps)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
