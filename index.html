const extractBrandKit = (data) => {
    const kit = { primaryColor: null, backgroundColor: null, textColor: null, fontFamily: null, fontRaw: null, fontSrc: null, fontWeight: 400, raw: {}, foundAt: null, allColors: {} };
    try {
        const ensureHash = v => {
            if (!v || typeof v !== 'string') return null;
            const clean = v.replace(/^#/, '').trim();
            if (clean.length === 8) return '#' + clean.slice(0, 6);
            if (clean.length === 6) return '#' + clean;
            if (clean.length === 3) return '#' + clean;
            return null;
        };
        const isColorLike = v => typeof v === 'string' && /^#?[0-9a-fA-F]{3,8}$/.test(v.trim());
        const findTheme = (obj, path) => {
            if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return null;
            if ('core_brandColorPrimary' in obj) return { obj, path };
            for (const k of Object.keys(obj)) {
                const found = findTheme(obj[k], `${path}.${k}`);
                if (found) return found;
            }
            return null;
        };
        const result = findTheme(data, 'root');
        if (result) {
            const { obj, path } = result;
            kit.raw = obj; kit.foundAt = path;
            kit.backgroundColor = ensureHash(obj.core_brandColorPrimary);
            kit.textColor       = ensureHash(obj.button_primaryText);
            const fp = obj.typography_font_primary;
            if (fp?.fontFamily) {
                kit.fontFamily = fp.fontFamily;
                kit.fontRaw    = fp.fullName || fp.fontFamily;
                kit.fontSrc    = fp.src || null;
                kit.fontWeight = fp.fontWeight || 400;
            }
            const seenHex = new Set();
            const colorEntries = [];
            const scanObj = (o, keyPrefix) => {
                if (!o || typeof o !== 'object' || Array.isArray(o)) return;
                for (const k of Object.keys(o)) {
                    const v = o[k];
                    if (typeof v === 'string' && isColorLike(v)) {
                        const hex = ensureHash(v);
                        if (hex && !seenHex.has(hex)) {
                            seenHex.add(hex);
                            colorEntries.push({ key: keyPrefix ? `${keyPrefix}_${k}` : k, hex });
                        }
                    } else if (v && typeof v === 'object' && !Array.isArray(v)) {
                        scanObj(v, k);
                    }
                }
            };
            scanObj(obj, '');
            const groups = {};
            for (const entry of colorEntries) {
                const seg = entry.key.replace(/^_/, '').split('_')[0] || 'other';
                if (!groups[seg]) groups[seg] = [];
                groups[seg].push(entry);
            }
            kit.allColors = groups;
        } else {
            kit.raw = data?.config?.settings || {};
        }
    } catch(e) { console.warn('[BrandKit] error', e); }
    return kit;
};

const getLuminance = hex => {
    try {
        const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
        const tl=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
        return 0.2126*tl(r)+0.7152*tl(g)+0.0722*tl(b);
    } catch { return 0; }
};
const getContrast = (h1,h2) => { try { const l1=getLuminance(h1),l2=getLuminance(h2); return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05); } catch { return 1; } };
const isValidHex = h => h && /^#[0-9a-fA-F]{6}$/.test(h);
const friendlyKey = key => key.replace(/^_/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();
const GROUP_LABELS = {core:'Core',button:'Button',nav:'Navigation',tab:'Tab Bar',card:'Card',text:'Text',icon:'Icon',border:'Border',background:'Background',badge:'Badge',header:'Header',product:'Product',search:'Search',modal:'Modal',toast:'Toast',other:'Other'};

const SuggestColors = ({ allColors, onApplyBg, onApplyText }) => {
    const [open, setOpen]         = useState(false);
    const [pickMode, setPickMode] = useState(null);
    const [selBg, setSelBg]       = useState(null);
    const [selText, setSelText]   = useState(null);
    const [hovered, setHovered]   = useState(null);

    const handleSwatch = hex => {
        if (pickMode==='bg')        { setSelBg(hex);   setPickMode(null); }
        else if (pickMode==='text') { setSelText(hex); setPickMode(null); }
        else if (!selBg)            { setSelBg(hex);   setPickMode('text'); }
        else if (!selText)          { setSelText(hex); setPickMode(null); }
        else                        { setSelBg(hex);   setPickMode('text'); }
    };

    return (
        <div className="border-t border-gray-100">
            <button onClick={()=>setOpen(v=>!v)}
                className="w-full flex items-center justify-between px-3 py-2 bg-[#f0effe] hover:bg-[#e8e5fe] transition-colors">
                <span className="text-[10px] font-bold text-[#3f1efb] uppercase tracking-wide">✨ Suggest Colors</span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="2.5" style={{transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .18s"}}>
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            {open && (
                <div className="px-3 py-3 space-y-3 bg-white">
                    <p className="text-[9px] text-gray-400 leading-relaxed">Click swatches to build a color pair — BG first, then Text. Preview contrast and apply to all slots.</p>
                    <div className="flex flex-wrap gap-1.5">
                        <button onClick={()=>setPickMode(pickMode==="bg"?null:"bg")}
                            className={"flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-semibold border transition-colors "+(pickMode==="bg"?"bg-[#3f1efb] text-white border-[#3f1efb]":"border-gray-300 text-gray-600 hover:border-[#3f1efb]")}>
                            {selBg && <span className="w-2.5 h-2.5 rounded-full border border-black/20 inline-block flex-shrink-0" style={{background:selBg}}/>}
                            {selBg ? selBg : "BG color"}
                        </button>
                        <button onClick={()=>setPickMode(pickMode==="text"?null:"text")}
                            className={"flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-semibold border transition-colors "+(pickMode==="text"?"bg-[#3f1efb] text-white border-[#3f1efb]":"border-gray-300 text-gray-600 hover:border-[#3f1efb]")}>
                            {selText && <span className="w-2.5 h-2.5 rounded-full border border-black/20 inline-block flex-shrink-0" style={{background:selText}}/>}
                            {selText ? selText : "Text color"}
                        </button>
                        {(selBg||selText) && (
                            <button onClick={()=>{setSelBg(null);setSelText(null);setPickMode(null);}} className="px-2 py-1 rounded-full text-[10px] text-gray-400 border border-gray-200 hover:bg-gray-100">✕</button>
                        )}
                    </div>
                    {pickMode && (
                        <p className="text-[9px] text-[#3f1efb] font-semibold animate-pulse">
                            {pickMode==="bg" ? "👆 Click a swatch → Background" : "👆 Click a swatch → Text color"}
                        </p>
                    )}
                    {selBg && selText && (
                        <div className="rounded-xl overflow-hidden border border-gray-200 shadow-sm">
                            <div className="px-3 py-3" style={{background:selBg}}>
                                <div className="text-[13px] font-black" style={{color:selText}}>Headline Text</div>
                                <div className="text-[10px]" style={{color:selText,opacity:0.85}}>Subheadline text</div>
                            </div>
                            <div className="p-2">
                                <button onClick={()=>{onApplyBg(selBg);onApplyText(selText);}}
                                    className="w-full py-1.5 bg-[#3f1efb] text-white rounded-lg text-[10px] font-bold hover:bg-[#2e14d5] transition-colors">
                                    Apply Pair to All Slots
                                </button>
                            </div>
                        </div>
                    )}
                    {selBg && !selText && (
                        <button onClick={()=>onApplyBg(selBg)} className="w-full py-1.5 bg-[#3f1efb] text-white rounded-lg text-[10px] font-bold hover:bg-[#2e14d5] transition-colors">
                            Apply BG Only
                        </button>
                    )}
                    {Object.entries(allColors).map(([group, entries]) => {
                        const valid = entries.filter(e => isValidHex(e.hex));
                        if (!valid.length) return null;
                        return (
                            <div key={group}>
                                <div className="text-[8px] font-extrabold text-gray-300 uppercase tracking-widest mb-1.5">{GROUP_LABELS[group] || group}</div>
                                <div className="flex flex-wrap gap-1.5">
                                    {valid.map(entry => {
                                        const isBg=selBg===entry.hex, isTx=selText===entry.hex, isHov=hovered===entry.key;
                                        return (
                                            <div key={entry.key} style={{position:"relative",display:"inline-block"}}>
                                                <button onClick={()=>handleSwatch(entry.hex)} onMouseEnter={()=>setHovered(entry.key)} onMouseLeave={()=>setHovered(null)}
                                                    style={{background:entry.hex,outline:isBg?"2.5px solid #6366f1":isTx?"2.5px solid #a855f7":"none",outlineOffset:"2px"}}
                                                    className={"w-8 h-8 rounded-lg border border-black/10 transition-transform "+((isBg||isTx||isHov)?"scale-110 shadow-md":"hover:scale-105")}
                                                    title={friendlyKey(entry.key)+": "+entry.hex}/>
                                                {(isBg||isTx) && (
                                                    <div style={{position:"absolute",top:"-4px",right:"-4px",width:"14px",height:"14px",borderRadius:"50%",background:isBg?"#6366f1":"#a855f7",color:"#fff",fontSize:"7px",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}>
                                                        {isBg?"B":"T"}
                                                    </div>
                                                )}
                                                {isHov && (
                                                    <div style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap"}}>
                                                        <div style={{background:"#111827",color:"#fff",borderRadius:"8px",padding:"4px 8px",fontSize:"9px",textAlign:"center",boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}}>
                                                            <div style={{fontWeight:700}}>{friendlyKey(entry.key)}</div>
                                                            <div style={{opacity:0.7,fontFamily:"monospace"}}>{entry.hex}</div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}
        </div>
    );
};

                className="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-[#3f1efb] pr-6" />
            {searching
                ? <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-[#3f1efb] animate-pulse">…</span>
                : query ? <button onClick={() => onQueryChange('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">×</button> : null}
        </div>
        <select value={selected} onChange={e => onSelect(e.target.value)}
            className="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-white focus:outline-none focus:ring-2 focus:ring-[#3f1efb]">
            {items.length === 0 ? <option>No results</option>
                : items.map(i => <option key={i[valueKey]} value={i[valueKey]}>{i[displayKey]}</option>)}
        </select>
    </div>
);

                shotX: existing.shotX,

                elements: cfg.elements.map(e=>({...e})),

                    const link = document.createElement('link');

            if(e.key==='ArrowLeft') { e.preventDefault(); setShotX(v=>v-step); }
            if(e.key==='ArrowRight'){ e.preventDefault(); setShotX(v=>v+step); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
    },[cur.screenshotImage]);

    useEffect(()=>{
        if(!canvasContainerRef.current) return;
        const observe = () => {
            const el = canvasContainerRef.current; if(!el) return;
            const pad=64,availW=el.clientWidth-pad,availH=el.clientHeight-pad;
            const scale=Math.min(availW/spec.cw,availH/spec.ch,0.55);
            setPreviewScale(Math.max(scale,0.18));

        observe();
        const ro = new ResizeObserver(observe);
        ro.observe(canvasContainerRef.current);
        return () => ro.disconnect();
    },[spec.cw, spec.ch]);

    const onDblClick=e=>{if(!canvasRef.current||!cur.screenshotImage)return;const rect=canvasRef.current.getBoundingClientRect();const x=(e.clientX-rect.left)/previewScale,y=(e.clientY-rect.top)/previewScale;const cw=spec.dw*cur.containerScale,ch=spec.dh*cur.containerScale;const cx=(spec.cw-cw)/2+cur.containerX,cy=spec.dy+cur.containerY;if(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch)setCanDragShot(v=>!v);};
    const onMouseDown=e=>{if(!canvasRef.current)return;const rect=canvasRef.current.getBoundingClientRect();const x=(e.clientX-rect.left)/previewScale,y=(e.clientY-rect.top)/previewScale;for(let i=elements.length-1;i>=0;i--){const el=elements[i];const ex=el.x/100*spec.cw,ey=el.y/100*spec.ch,half=(el.size||120)/2;if(Math.abs(x-ex)<=half&&Math.abs(y-ey)<=half){setDragElem(el.id);setDragStart({x,y});return;}}if(Math.abs(y-hY)<50&&x>100&&x<spec.cw-100){setDragHl(true);setDragStart({x,y});return;}if(Math.abs(y-sY)<50&&x>100&&x<spec.cw-100){setDragSub(true);setDragStart({x,y});return;}if(!cur.screenshotImage)return;const cw=spec.dw*cur.containerScale,ch=spec.dh*cur.containerScale;const cx=(spec.cw-cw)/2+cur.containerX,cy=spec.dy+cur.containerY;const ho=10,hs=30;for(const[hx,hy]of[[cx+ho,cy+ho],[cx+cw-ho,cy+ho],[cx+ho,cy+ch-ho],[cx+cw-ho,cy+ch-ho]]){if(Math.hypot(x-hx,y-hy)<=hs/2){setDragHnd(true);setDragStart({x,y,scale:cur.containerScale});return;}}if(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch){if(canDragShot)setDragShot(true);else setDragCont(true);setDragStart({x,y});}};
    const onMouseMove=e=>{if(!canvasRef.current)return;const rect=canvasRef.current.getBoundingClientRect();const x=(e.clientX-rect.left)/previewScale,y=(e.clientY-rect.top)/previewScale;if(dragElem!==null){const nx=Math.max(0,Math.min(100,x/spec.cw*100)),ny=Math.max(0,Math.min(100,y/spec.ch*100));setElements(els=>els.map(e=>e.id===dragElem?{...e,x:Math.round(nx*10)/10,y:Math.round(ny*10)/10}:e));return;}if(cur.screenshotImage&&!dragHl&&!dragSub&&!dragCont&&!dragHnd&&!dragShot){const cw=spec.dw*cur.containerScale,ch=spec.dh*cur.containerScale;const cx=(spec.cw-cw)/2+cur.containerX,cy=spec.dy+cur.containerY;setShowHnds(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch);}if(dragHl)setHY(Math.round(Math.max(30,Math.min(spec.ch-50,y))));else if(dragSub)setSY(Math.round(Math.max(30,Math.min(spec.ch-50,y))));else if(dragHnd){const cCx=spec.cw/2+cur.containerX,cCy=spec.dy+(spec.dh*dragStart.scale)/2+cur.containerY;const sd=Math.hypot(dragStart.x-cCx,dragStart.y-cCy),cd=Math.hypot(x-cCx,y-cCy);updCur({containerScale:Math.max(0.5,Math.min(2,dragStart.scale*cd/sd))});}else if(dragShot){setShotX(v=>v+(x-dragStart.x));setShotY(v=>v+(y-dragStart.y));setDragStart({x,y});}else if(dragCont){updCur({containerX:cur.containerX+(x-dragStart.x),containerY:cur.containerY+(y-dragStart.y)});setDragStart({x,y});}};

                            <div key={p.id} className="flex-shrink-0 flex flex-col items-center gap-3">
                                <img src={p.dataURL} style={{height:'72vh',width:'auto',borderRadius:'22px',boxShadow:'0 24px 64px rgba(0,0,0,0.6)',border:'1px solid rgba(255,255,255,0.08)'}}/>
                                <div className="flex items-center gap-2"><span className="text-white text-xs font-semibold opacity-80">{p.label}</span><button onClick={()=>{const a=document.createElement('a');a.href=p.dataURL;a.download=`${p.label}.png`;a.click();}} className="text-[9px] px-2 py-0.5 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded transition-colors font-medium">↓ Save</button></div>
                            </div>
                        ))}
                        {screenshots.filter(s=>!s.screenshotImage).map(s=>(
                            <div key={s.id} className="flex-shrink-0 flex flex-col items-center gap-3">
                                <div style={{height:'72vh',aspectRatio:'1242/2688',borderRadius:'22px',border:'2px dashed rgba(255,255,255,0.12)',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="text-center px-4"><p className="text-gray-600 text-xs font-semibold">{s.label}</p><p className="text-gray-700 text-[9px] mt-1">No screenshot</p></div></div>
                                <span className="text-gray-600 text-xs font-semibold">{s.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {toast&&(
                <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',zIndex:9999,animation:'toastIn .25s ease-out'}} className="bg-gray-900 text-white px-5 py-2.5 rounded-xl shadow-2xl flex items-center gap-2 text-xs font-semibold">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                    {toast}
                </div>
            )}
        </div>
    );
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
